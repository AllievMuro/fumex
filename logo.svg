<svg viewBox="0 0 512 512" width="512" height="512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="fmx-grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#BE185D"/>
      <stop offset="100%" stop-color="#9D174D"/>
    </linearGradient>
    <linearGradient id="fmx-grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F9A8D4"/>
      <stop offset="100%" stop-color="#BE185D"/>
    </linearGradient>
    <filter id="fmx-glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#1A0A0F"/>

  <!-- Subtle background glow -->
  <ellipse cx="256" cy="256" rx="180" ry="160" fill="#BE185D" opacity="0.07"/>

  <!-- F letterform with hidden lightning bolt in negative space -->
  <!-- Main F shape as filled block, negative space cuts reveal arrow/lightning -->

  <!-- F body - large block -->
  <!-- Vertical stem of F -->
  <rect x="120" y="130" width="72" height="252" rx="8" fill="url(#fmx-grad1)" filter="url(#fmx-glow)"/>

  <!-- Top horizontal bar of F -->
  <rect x="120" y="130" width="200" height="68" rx="8" fill="url(#fmx-grad1)" filter="url(#fmx-glow)"/>

  <!-- Middle horizontal bar of F -->
  <rect x="120" y="226" width="160" height="60" rx="8" fill="url(#fmx-grad1)" filter="url(#fmx-glow)"/>

  <!-- Hidden lightning bolt in negative space within the F -->
  <!-- The lightning bolt is formed by the negative space cutout inside the F bars -->
  <!-- Lightning bolt shape as negative space (background color) inside top bar region -->
  <!-- Top part of bolt going down-right -->
  <polygon points="230,148 265,148 242,198 272,198 215,280 228,230 200,230 230,148" fill="#1A0A0F"/>

  <!-- X mark on the right side -->
  <!-- X composed of two crossing strokes -->
  <!-- Stroke 1: top-left to bottom-right -->
  <rect x="316" y="126" width="72" height="260" rx="8" fill="url(#fmx-grad1)" filter="url(#fmx-glow)" transform="rotate(30 352 256)"/>
  <!-- Stroke 2: top-right to bottom-left -->
  <rect x="316" y="126" width="72" height="260" rx="8" fill="url(#fmx-grad1)" filter="url(#fmx-glow)" transform="rotate(-30 352 256)"/>

  <!-- Mask out center of X to clean up overlap -->
  <circle cx="352" cy="256" r="32" fill="#1A0A0F"/>
  <!-- Center diamond accent -->
  <polygon points="352,228 372,256 352,284 332,256" fill="url(#fmx-grad2)" filter="url(#fmx-glow)"/>

  <!-- Wordmark -->
  <text x="256" y="430" font-family="'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="700" letter-spacing="12" fill="#FDF2F8" text-anchor="middle" opacity="0.9">FUMEX</text>

  <!-- Tagline dot accent -->
  <circle cx="256" cy="460" r="3" fill="#F9A8D4" opacity="0.7"/>
</svg>